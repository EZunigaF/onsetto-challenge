name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check part1_browser part2_api

      - name: Ruff (format)
        run: uv run ruff format --check part1_browser part2_api

      - name: Mypy (types)
        run: uv run mypy part2_api/onsetto_client part2_api/main.py part1_browser/automate.py

      - name: Pytest
        run: uv run pytest -q
